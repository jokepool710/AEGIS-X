name: V3 Benchmark and Ablation Study

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "aegis/detection/**"
      - "aegis/evaluation/**"
      - "tests/test_scenarios.py"
      - "scripts/run_v3_ablation.py"
      - ".github/workflows/v3-ablation.yml"

jobs:
  v3-ablation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest -q --ignore=tests/integration
      - name: Run v1-v2-v3 ablation matrix
        run: python scripts/run_v3_ablation.py
      - name: Upload ablation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v3-ablation-results
          path: artifacts/ablation/
          retention-days: 30

