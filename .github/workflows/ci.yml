name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Install and start MQTT broker
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto mosquitto-clients
          sudo systemctl restart mosquitto
          for i in {1..20}; do
            mosquitto_pub -h 127.0.0.1 -p 1883 -t aegis/ci/health -m ready && exit 0
            sleep 1
          done
          exit 1
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: python -m pytest -q --ignore=tests/integration
      - name: End-to-end telemetry integration test
        env:
          E2E_MQTT_PORT: "1883"
          E2E_TIMEOUT: "30"
        run: python -m pytest -q -s tests/integration/test_telemetry_e2e.py
